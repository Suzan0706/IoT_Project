<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ notification.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .notification-header {
            background: linear-gradient(135deg, #8A2BE2, #4D77FF);
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }
        .notification-header h1 {
            margin: 0;
            font-size: 24px;
        }
        .notification-body {
            background: #f8f9fa;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-top: none;
            border-radius: 0 0 8px 8px;
        }
        .notification-message {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }
        .notification-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
            text-align: center;
            font-size: 12px;
            color: #6c757d;
        }
        .notification-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .notification-type.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .notification-type.success {
            background: #d4edda;
            color: #155724;
        }
        .notification-type.warning {
            background: #fff3cd;
            color: #856404;
        }
        .notification-type.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="notification-header">
        <h1>{{ notification.title }}</h1>
    </div>
    <div class="notification-body">
        <div style="text-align: center;">
            <span class="notification-type {{ notification.notification_type }}">{{ notification.get_notification_type_display }}</span>
        </div>
        <div class="notification-message">
            {{ notification.message|linebreaks }}
        </div>
        <div class="notification-footer">
            <p>Received on {{ notification.created_at|date:"F d, Y" }} at {{ notification.created_at|time:"H:i" }}</p>
            <p>ARU IoT Dataset Catalogue</p>
        </div>
    </div>
</body>
</html>
